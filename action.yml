name: 'Step Selector para validaciones pre-productivas'
description: 'Unique step to Validate Status'
inputs:
  locking:
    description: "Bloqueante=true"
    required: false
    type: boolean
    default: false
  type:
    description: "Tipo de conjunto de validaciones"
    required: false
    default: "v3"
  qualitygatedata:
    description: "input que queda para datos recibidos de preparativos"
    required: false
    default: ""

#Inputs para Sentinel
  scan_id:
    description: "ScanId para consultar el Quality Gate en la API Sentinel"
    required: true
    default: 1
  sentinel_url:
    description: "URL base de la API de Sentinel (sin trailing slash)"
    required: false
    default: "https://sentinel-api-gitops-prod.apps.andreani.com.ar"

runs:
  using: "composite"
  steps:
    - name: Key Repository
      uses: actions/github-script@v8
      with:
        script: |
          const name = context.repo.repo
          const organization = context.repo.owner
          core.exportVariable('KEY_REPOSITORY', `${organization}_${name}`)
    - name: Validate Quality Gates
      uses: infrastructure-services/continuos-deployment@validate-pre-prod-sentinel
      with:
        locking:  ${{ inputs.locking }}
        type: ${{ inputs.type }}
        qualitygatedata: ${{ inputs.qualitygatedata }}
        scan_id: ${{ inputs.scan_id }}
        sentinel_url: ${{ inputs.sentinel_url }}
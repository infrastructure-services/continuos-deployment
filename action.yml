name: 'Validate PreProd'
description: 'Unique step to Validate Status Project (SonarQube)'
inputs:
  sonar_url:
    description: "Url SonarQube"
    required: true
  sonar_token:
    description: "Token de acceso SonarQube"
    required: true
  branch:
    description: "Branch SonarQube"
    required: false
    default: "main"
  scan_id:
    description: "ScanId para consultar el Quality Gate en la API Sentinel"
    required: true
    default: 1
  sentinel_url:
    description: "URL base de la API de Sentinel (sin trailing slash)"
    required: false
    default: "https://github-integration-gitops-test.apps.ocptest.andreani.com.ar"

runs:
  using: "composite"
  steps:
    - name: Key Repository
      uses: actions/github-script@v7
      with:
        script: |
          const name = context.repo.repo
          const organization = context.repo.owner
          core.exportVariable('KEY_REPOSITORY', `${organization}_${name}`)
    - name: Validate
      shell: bash
      run: |
        REPO_ID="${{ github.repository_id }}"
        BRANCH="${{ github.head_ref || github.ref_name }}"
        COMMIT_SHA="${{ github.sha }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"

        ENCODED_BRANCH=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${BRANCH}'))")

        QUERY_PARAMS="branch=${ENCODED_BRANCH}&commitSha=${COMMIT_SHA}"
        if [ -n "$PR_NUMBER" ]; then
          QUERY_PARAMS="${QUERY_PARAMS}&pullRequestNumber=${PR_NUMBER}"
        fi

        SENTINEL_URL="${{ inputs.sentinel_url }}/api/v1/scans/repository/${REPO_ID}/validation?${QUERY_PARAMS}"

        echo "🔗 URL de validación: ${SENTINEL_URL}"

        RETRY_WAIT=5

        while true; do
          echo "🔍 Consultando Sentinel API..."

          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" -X GET "$SENTINEL_URL")

          echo "📡 HTTP Status recibido: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Quality Gate passed."
            exit 0

          elif [ "$HTTP_STATUS" -eq 409 ]; then
            echo "❌ Quality Gate failed."
            echo "⛔ La API Sentinel respondió con 409: el análisis no superó el Quality Gate."
            exit 1

          elif [ "$HTTP_STATUS" -eq 204 ]; then
            echo "⏳ La API Sentinel respondió con 204 (sin resultado aún). Reintentando en ${RETRY_WAIT}s..."
            sleep $RETRY_WAIT

          else
            echo "❌ Respuesta inesperada de la API Sentinel: HTTP $HTTP_STATUS"
            echo "⛔ Se interrumpe el pipeline por error desconocido."
            exit 1
          fi
        done

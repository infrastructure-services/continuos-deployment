name: 'Deploy Selector'
description: 'Selecciona el mejor despliegue posible según el cluster objetivo'
inputs:
  #Cluster de Destino
  TARGET_CLUSTER:
    description: "Cluster objetivo donde se despliega"
    required: true
  TARGET_VARIABLE:
    description: "Variable conteniendo la data del cluster"
    required: true
  TARGET_SECRET:
    description: "Secret conteniendo la data del cluster"
    required: true


  # ACR
  ACR_USERNAME:
    description: "user de acr"
    required: true
  ACR_PASSWORD:
    description: "passwrd de acr"
    required: true
  ACR_NAME:
    description: "nommbre del acr"
    required: true
  ACR_FULL_NAME:
    description: "nombre del acr con azurecr.io"
    required: true

  # App
  appName:
    description: "Nombre de la aplicacion (dentro del proyecto)"
    required: true
  teamProject:
    description: "Nombre del proyecto/equipo"
    required: true
  appVersion:
    description: "tag para subir imagen"
    required: true
  namespace:
    description: "nombre de namespace de despliegue"
    required: false
    default: ""
  environment:
    description: "nombre de environment"
    required: false
    default: "test"

  # Values
  helmRepo:
    description: "Repositorio de helm"
    required: false
    default: "infrastructure-services/manifiestos-cd"
  helmRepoRef:
    description: "Ref del repositorio de Helm"
    required: false
    default: "standard-nocert"
  cpuLimit:
    description: "Limite de CPU del pod"
    required: false
    default: "1"
  memLimit:
    description: "Limite de Memoria del Pod"
    required: false
    default: "1Gi"
  cpuRequest:
    description: "Request de CPU del pod"
    required: false
    default: "20m"
  memRequest:
    description: "Request de Memoria del Pod"
    required: false
    default: "100Mi"
  fileValuesPath:
    description: "path archivo de values.yaml"
    required: true
  GITHUB_HELMREPO_TOKEN:
    description: "Token para descargar el codigo de templates HELM"
    required: true
  APPS_CERTIFICATE:
    description: "Certificado para el dominio de apps en ARO"
    required: false
    default: ""
  APPS_CA_CERTIFICATE:
    description: "Certificado de la CA"
    required: false
    default: ""
  APPS_KEY_CERTIFICATE:
    description: "Certificado ARO Key"
    required: false
    default: ""

  # HELM
  helmChartVersionLatest:
    description: "VersionHelm"
    required: true
    

  # Keyvault
  AZURE_KEYVAULT_NAME:
    description: "Nombre del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_TENANT:
    description: "Tenant del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_CLIENT_ID:
    description: "Client ID del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_SECRET:
    description: "Secret del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_PREFIX:
    description: "Prefijo de las variables de la app en keyvault"
    required: false
    default: ""

outputs:
  name_environment: 
    description: "Nombre del environment"
    value: ${{ steps.setOutputs.outputs.environment }}
  url_environment:
    description: "URL del environment"
    value: ${{ steps.setOutputs.outputs.url }}

runs:
  using: "composite"
  steps:
    - name: Configurar variables para despliegue
      id: configurar_despliegue
      run: |
        # Extracción de variables
        # Guardar el contenido del var en un archivo temporal
        echo '${{ inputs.TARGET_VARIABLE }}' > var_content.txt
        
        #Extraigo variables
        FQDN=$(jq -r '.CLUSTERFQDN' var_content.txt)
        APMURL=$(jq -r '.APM_SERVER_URL' var_content.txt)

        #Configuro ENV
        echo "CLUSTERFQDN=$FQDN" >> $GITHUB_ENV
        echo "APM_SERVER_URL=$APMURL" >> $GITHUB_ENV

        # Ahora lo mismo con el secret
        echo '${{ inputs.TARGET_SECRET }}' > secret_content.txt
        
        # Debug: ver el contenido del archivo
        echo "🔍 Contenido del archivo:"
        cat secret_content.txt
        
        #Extraigo variables
        URL=$(jq -r '.ARGO_URL' secret_content.txt)
        USR=$(jq -r '.ARGO_USER' secret_content.txt)
        PAS=$(jq -r '.ARGO_PASS' secret_content.txt)

        #Configuro ENV (Despues lo haré directo con la var y el secret de cluster)
        echo "ARGO_URL=$URL" >> $GITHUB_ENV
        echo "ARGO_USR=$USR" >> $GITHUB_ENV
        echo "ARGO_PAS=$PAS" >> $GITHUB_ENV
        
        #Limpieza
        rm -f secret_content.txt var_content.txt
      shell: bash
    - name: Deploy
      id: deploy
      if: ${{ inputs.TARGET_CLUSTER == 'AKSTEST' || inputs.TARGET_CLUSTER == 'AKSQA' || inputs.TARGET_CLUSTER == 'CCEPROD' || inputs.TARGET_CLUSTER == 'AROPROD' || inputs.TARGET_CLUSTER == 'AKSPRODBR' || inputs.TARGET_CLUSTER == 'AKSPRODUS' }}
      uses: infrastructure-services/continuos-deployment@helm-and-deploy
      with:
        appName: ${{ vars.APPNAME }}
        teamProject: ${{ vars.PROJECT }}
        namespace: ${{ vars.PROJECT }}-${{ vars.SUFIJO }}
        appVersion: ${{ inputs.appVersion }}
        clusterFqdn: ${{ env.CLUSTERFQDN }}
        fileValuesPath: .devops/${{ vars.ENVIRONMENT_NAME }}/value-${{ vars.SUFIJO }}.yaml
        GITHUB_HELMREPO_TOKEN: ${{ secrets.ARQUITECTURA_DEPLOY }}
        helmChartVersionLatest: ${{ needs.Preparativos.outputs.helmVersion }}.${{ vars.SUFIJO }}
        ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
        ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        ACR_FULL_NAME: ${{ secrets.ACR_FULL_NAME }}
        ACR_NAME: ${{ secrets.ACR_NAME }}
        ARGO_USERNAME: ${{ env.ARGO_USR }}
        ARGO_PASSWORD: ${{ env.ARGO_PAS }}
        ARGO_URL: ${{env.ARGO_URL }}
        environment: ${{ vars.SUFIJO }}
        helmRepoRef: ${{ vars.FLAVOR }}
        APM_SERVER_URL: ${{env.APM_SERVER_URL}}
        AZURE_KEYVAULT_NAME: ${{ secrets.KV_NAME_TEST }}
        AZURE_KEYVAULT_TENANT: ${{ secrets.KV_TENANT_TEST }}
        AZURE_KEYVAULT_CLIENT_ID: ${{ secrets.KV_CLIENT_ID_TEST }}
        AZURE_KEYVAULT_SECRET: ${{ secrets.KV_SECRET_TEST }}
        AZURE_KEYVAULT_PREFIX: ${{ vars.APP_ID }}-TEST
    - run: echo "✅ Success" 



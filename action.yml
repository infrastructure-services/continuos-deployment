name: 'Image Tag Check Multinstance'
description: 'Action to check if provided image tags exist for each instance of a certain app and project'
inputs:
  # ACR
  REGISTRY_USER:
    description: "user de acr"
    required: true
  REGISTRY_PASS:
    description: "Token de acr"
    required: true
  ACR_FULL_NAME:
    description: "Nombre del acr con azurecr.io"
    required: true

  # App
  appName:
    description: "Nombre de la aplicacion (dentro del proyecto)"
    required: true
  teamProject:
    description: "Nombre del proyecto/equipo"
    required: true
  appVersion:
    description: "tag base a buscar"
    required: true

  # Instancias
  instancias:
    description: 'Instancias a desplegar (Ej ["00","01"])'
    required: true

runs:
  using: "composite"
  steps:
    - name: Check tag existence
      shell: bash
      run: |
          all_found=true
          instancias='${{ inputs.instancias }}'
          instancias2=$(echo "$instancias" | jq -r '.[]')
          echo "Instancias a Buscar"
          echo $instancias2

          for instancia in $instancias2; do
            tags=$(curl -s -u "${{ inputs.REGISTRY_USER }}:${{ inputs.REGISTRY_PASS }}" "https://${{ inputs.ACR_FULL_NAME }}/v2/${{ inputs.teamProject }}-${{ inputs.appName }}-$instancia/tags/list?n=500" | jq -r '.tags[]')
            found=false
            for t in $tags; do
              if [ "$t" = "${{ inputs.appVersion }}" ]; then
                found=true
                break
              fi
            done
            if ! $found; then
              echo "No se encontró la versión $tag"
              all_found=false
            else
              echo "Se encontró la versión $tag"
            fi
          done
          if ! $all_found; then
            echo "No se encontraron todas las imagenes requeridas."
            exit 1
          else
            echo "Se encontraron todas las imagenes requeridas."
            echo "::notice::✅Versión correcta: ${{ inputs.appVersion }}"
            exit 0
          fi

name: 'Customize Values'
description: 'Action to generate values.yaml file from .devops values-env.yaml file and application variables'
inputs:
  appdataJson:
    description: "Nombre de la aplicacion (dentro del proyecto)"
    required: true
  appVersion:
    description: "tag para subir imagen"
    required: true
  environment:
    description: "nombre de environment"
    required: false
    default: "test"
  sufijo:
    description: "sufijo de cluster"
    required: false
    default: "test"
  fileValuesPath:
    description: "path archivo de values.yaml"
    required: true

  # CR
  REGISTRY_DATA:
    description: "Secreto de datos de la registry correspondiente"
    required: true
  REGISTRY_SELECTOR:
    description: "Tipo de registry a seleccionar"
    required: false
    default: "acr"


  # HELM y Values
  helmRepo:
    description: "Repositorio de templates de manifiestos"
    required: false
    default: "infrastructure-services/manifiestos-cd"
  flavor:
    description: "Conjunto de manifiestos a utilizar"
    required: false
    default: "new-standard"
  GITHUB_HELMREPO_TOKEN:
    description: "Token para descargar el codigo de templates HELM"
    required: true
  helmChartVersionLatest:
    description: "VersionHelm"
    required: true

  # cluster
  TARGET_CLUSTER:
    description: "Cluster de Destino"
    required: true
  clusterFqdn:
     description: "FQDN correspondiente a la app"
     required: true
  gslb:
     description: "Si contiene configuración de GSLB"
     required: false
     default: "false"

  # Keyvault
  AZURE_KEYVAULT_NAME:
    description: "Nombre del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_TENANT:
    description: "Tenant del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_CLIENT_ID:
    description: "Client ID del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_SECRET:
    description: "Secret del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_PREFIX:
    description: "Prefijo de las variables de la app en keyvault"
    required: false
    default: ""

  # Observabilidad
  APM_SERVER_URL:
    description: "Url de APM"
    required: false
    default: "https://apm-mon.andreani.com"
  ELASTIC_APM_ACTIVE:
    description: "APM Activo"
    required: false
    default: "true"
  ELASTIC_APM_ENABLED:
    description: "APM Enabled"
    required: false
    default: "true"
  REACT_APP_DISABLE_APM:
    description: "APM Desactivado para las apps de React"
    required: false
    default: "0"
  NEXT_PUBLIC_DISABLE_APM:
    description: "APM Desactivado para las apps de nextJs"
    required: false
    default: "0"
  APM_SERVICE_NAME:
    description: "Service Name específico (Opcional, no se usa)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - run: echo '🎁Customizing values.yaml'
      shell: bash

    - name: Install Helm
      uses: azure/setup-helm@v5
      with:
        version: v3.21.2       #Valor viejo 5/11/2024 v3.12.3 se usaba así por bug en versión 3.13
        
    - name: checkout codigo
      uses: actions/checkout@v6

    - name: Copy values.yaml
      shell: bash
      run: |-
          ls ../
          cp ${{ inputs.fileValuesPath }} ../values.yaml

    - name: Checkout code helm templates
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.helmRepo }}
        ref: ${{ inputs.flavor }}
        token: ${{ inputs.GITHUB_HELMREPO_TOKEN }}
    
    - name: Restore values.yaml
      shell: bash
      run: cp ../values.yaml values.yaml
    
    - name: Helm customizer le agregan valores al values
      shell: bash
      env:
        APPDATA_JSON: ${{ inputs.appdataJson }}
        REGISTRY_DATA_JSON: ${{ inputs.REGISTRY_DATA }}
        REGISTRY_SELECTOR_VALUE: ${{ inputs.REGISTRY_SELECTOR }}
        INPUT_SUFIJO: ${{ inputs.sufijo }}
        INPUT_TARGET_CLUSTER: ${{ inputs.TARGET_CLUSTER }}
        INPUT_GSLB: ${{ inputs.gslb }}
        INPUT_CLUSTER_FQDN: ${{ inputs.clusterFqdn }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
      run: |-
        #Configuro variables para customización
        APP_NAME=$(echo "$APPDATA_JSON" | jq -r '.appdata.appname')
        PROJECT_NAME=$(echo "$APPDATA_JSON" | jq -r '.appdata.projectName')
        CHART_NAME="${PROJECT_NAME}-${APP_NAME}"
        NAMESPACE="${PROJECT_NAME}-${INPUT_SUFIJO}"
        ARTIFACT_NAME="${APP_NAME}-${NAMESPACE}"
        echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV" 

        #Inserto nombre del chart a generar
        yq -i ".name = \"${CHART_NAME}\"" Chart.yaml
        #o
        #echo "name: ${CHART_NAME}" >> Chart.yaml

        #Comienzo formación de values con los datos del cluster
        echo "############ SECCION VARIABLES INYECTADAS #################" >> values.yaml
        echo "cluster:" >> values.yaml
        echo "  name: ${INPUT_TARGET_CLUSTER}"  >> values.yaml
        echo "  gslb: ${INPUT_GSLB}"  >> values.yaml
        echo "  fqdn: ${INPUT_CLUSTER_FQDN}"  >> values.yaml

        #Customizo Json de APP
        json_modificado=$(echo "$APPDATA_JSON" | jq --arg namespace "$NAMESPACE" '.appdata.namespace = $namespace')
        REPO_NAME="${GITHUB_REPOSITORY##*/}"
        REPO="${GITHUB_REPOSITORY_OWNER}--${REPO_NAME}"
        json_modificado=$(echo "$json_modificado" | jq --arg repo "$REPO" '.appdata.originRepo = $repo')

        #Agrego la path de la registry según a qué registry fue
        echo '${{ inputs.REGISTRY_DATA }}' > reg_content.txt
        if [[ ${{ inputs.REGISTRY_SELECTOR }} == "acr" ]]; then
          ACR_FULL_NAME=$(jq -r '.ACR_FULL_NAME' reg_content.txt)
          json_modificado=$(echo "$json_modificado" | jq --arg regname "$ACR_FULL_NAME" '.appdata.registry = $regname')
        elif [[ ${{ inputs.REGISTRY_SELECTOR }}  == "ecr" ]]; then
          ECR_FULLNAME=$(jq -r '.ECR_FULLNAME' reg_content.txt)
          json_modificado=$(echo "$json_modificado" | jq --arg regname "$ECR_FULLNAME" '.appdata.registry = $regname')
        else
          echo "error::Tipo de registry desconocido"
          exit 1
        fi

        echo "$json_modificado" | yq -P '.' >> values.yaml

        

        # 🚀 Agregás tu sección "env_default"
        echo 'env_default:' >> values.yaml
        echo '  ELASTIC_APM_ACTIVE: ${{ inputs.ELASTIC_APM_ACTIVE }}' >> values.yaml
        echo '  ELASTIC_APM_ENABLED: ${{ inputs.ELASTIC_APM_ENABLED }}' >> values.yaml
        echo '  REACT_APP_DISABLE_APM: ${{ inputs.REACT_APP_DISABLE_APM }}' >> values.yaml
        echo '  NEXT_PUBLIC_DISABLE_APM: ${{ inputs.NEXT_PUBLIC_DISABLE_APM }}' >> values.yaml
        echo '  ELASTIC_APM_SERVER_URL: "${{inputs.APM_SERVER_URL}}"' >> values.yaml
        echo '  ELASTIC_APM_SERVICE_NAME: ${NAMESPACE}_${APP_NAME}' >> values.yaml
        echo '  Observability__ServerUrls: "${{inputs.APM_SERVER_URL}}"' >> values.yaml
        echo '  Observability__ServerUrl: "${{inputs.APM_SERVER_URL}}"' >> values.yaml
        echo '  Observability__ServiceName: ${NAMESPACE}_${APP_NAME}' >> values.yaml
        echo '  REACT_APP_ELASTIC_APM_ACTIVE: ${{ inputs.ELASTIC_APM_ACTIVE }}' >> values.yaml
        echo '  REACT_APP_ELASTIC_APM_ENABLED: ${{ inputs.ELASTIC_APM_ENABLED }}' >> values.yaml
        echo '  REACT_APP_ELASTIC_APM_SERVER_URL: "${{inputs.APM_SERVER_URL}}"' >> values.yaml
        echo '  REACT_APP_ELASTIC_APM_SERVICE_NAME: ${NAMESPACE}_${APP_NAME}' >> values.yaml
        if [[ ${{inputs.environment}} == "test" ]]; then
          echo '  Observability__Environment: Test'  >> values.yaml
        elif [[ ${{inputs.environment}} == "qa" ]]; then
          echo '  Observability__Environment: QA'  >> values.yaml
        elif [[ ${{inputs.environment}} == "preprod" ]]; then
          echo '  Observability__Environment: Preprod'  >> values.yaml
        else
          echo '  Observability__Environment: Production'  >> values.yaml
        fi

    - name: Inject Azure Key Vault if exists
      shell: bash
      env: 
        AZURE_KEYVAULT_CLIENT_ID: ${{ inputs.AZURE_KEYVAULT_CLIENT_ID }}
        AZURE_KEYVAULT_SECRET: ${{ inputs.AZURE_KEYVAULT_SECRET }}
        AZURE_KEYVAULT_NAME: ${{ inputs.AZURE_KEYVAULT_NAME }}
        AZURE_KEYVAULT_TENANT: ${{ inputs.AZURE_KEYVAULT_TENANT }}
        AZURE_KEYVAULT_PREFIX: ${{ inputs.AZURE_KEYVAULT_PREFIX }}
      if: ${{ inputs.AZURE_KEYVAULT_NAME != '' && inputs.AZURE_KEYVAULT_TENANT != '' && inputs.AZURE_KEYVAULT_CLIENT_ID != '' && inputs.AZURE_KEYVAULT_SECRET != '' }}
      run: |
        sed -i "/scalingcontrol:/i \    AzureKeyVault__Name: ${AZURE_KEYVAULT_NAME}" values.yaml
        sed -i "/scalingcontrol:/i \    AzureKeyVault__TenantId: ${AZURE_KEYVAULT_TENANT}" values.yaml
        sed -i "/scalingcontrol:/i \    AzureKeyVault__ClientId: ${AZURE_KEYVAULT_CLIENT_ID}" values.yaml
        sed -i "/scalingcontrol:/i \    AzureKeyVault__ClientSecret: ${AZURE_KEYVAULT_SECRET}" values.yaml
        sed -i "/scalingcontrol:/i \    AzureKeyVault__Prefix: ${AZURE_KEYVAULT_PREFIX}" values.yaml

    - name: show values
      shell: bash
      run: cat values.yaml

    - name: show Chart
      shell: bash
      run: cat Chart.yaml

    - name: Archive values yaml
      uses: actions/upload-artifact@v6
      with:
        name: ${{ env.ARTIFACT_NAME }}
        overwrite: true
        path: |
          values.yaml
          Chart.yaml
          templates/







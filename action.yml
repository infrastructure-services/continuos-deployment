name: 'Generic helm pack and Push to ACR y SWR'
description: 'Helm pack and push to acr y swr'
inputs:
  ACR_USERNAME:
    description: "user de acr"
    required: true
  ACR_PASSWORD:
    description: "passwrd de acr"
    required: true
  ACR_FULL_NAME:
    description: "nombre del acr con azurecr.io"
    required: true
  appName:
    description: "Nombre de la aplicacion (dentro del proyecto)"
    required: true
  namespace:
    description: "nombre de namespace"
    required: false
    default: ""
  teamProject:
    description: "Nombre del proyecto/equipo"
    required: true
  appVersion:
    description: "tag para subir imagen"
    required: true
  helmChartVersionLatest:
     description: "VersionHelm"
     required: true
 
 #ECR
  ECR_ID:
    description: "user de ecr"
    required: true
  ECR_PASSWORD:
    description: "passwrd de ecr"
    required: true
  ECR_FULLNAME:
    description: "nombre del ecr con public.ecr.aws"
    required: true
    
runs:
  using: "composite"
  steps:
      - run: echo 'Inicia el proceso'
        shell: bash
      
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.3 #Helm 13 tiene un bug
      
      - name: Reviso archivos y version helm
        shell: bash
        run: |-
           ls
           helm version --short

      - uses: actions/download-artifact@v4
        with:
          name: ${{inputs.appName}}-${{inputs.namespace}}

    # Verifica helm por errores (deberia ser bloqueante). Revisar este paso con un Json para asegurar que esté correcto.
      - name: Helm Lint 
        shell: bash
        run: |-
          helmLint="helm lint --values=values.yaml > /dev/null 2>&1"
          if eval "$helmLint"; then
             echo "HELM Lint OK - The template folder and values file format is OK";
          else
             echo "HELM Lint FAIL - There is a problem with the folder 'templates' or the values file format";
             exit 1
          fi

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ inputs.ACR_NAME }}.azurecr.io #ACR_FULL_NAME incluye el azurecr.io
          username: ${{ inputs.ACR_USERNAME }}
          password: ${{ inputs.ACR_PASSWORD }}
      - name: Helm Package and Push to ECR Public
        shell: bash
        run: |-
          export PATH="/usr/local/bin:$PATH"
          export HELM_EXPERIMENTAL_OCI=1

          # Package el chart, deja el nombre igual para ambos registries
          helm package --version ${{ inputs.helmChartVersionLatest }} --app-version ${{ inputs.appVersion }} --namespace ${{ inputs.namespace }} .

          # Push to ACR (tu formato actual)
          echo '${{ inputs.ACR_PASSWORD }}' | helm registry login ${{ inputs.ACR_FULL_NAME }} --username ${{ inputs.ACR_USERNAME }} --password-stdin
          helm push ${{inputs.TeamProject}}-${{inputs.appName}}-${{inputs.helmChartVersionLatest}}.tgz oci://${{inputs.ACR_FULL_NAME}}/helm/

          # Push to ECR Public (usa EXACTAMENTE el mismo repo layout)
          aws configure set aws_access_key_id ${{ inputs.ECR_ID }}
          aws configure set aws_secret_access_key ${{ inputs.ECR_PASSWORD }}

          REPOSITORY_NAME="helm/${{ inputs.TeamProject }}-${{ inputs.appName }}"
          # Crea el repo en ECR si no existe
          aws ecr-public describe-repositories --repository-names "$REPOSITORY_NAME" --region us-east-1 || \
          aws ecr-public create-repository --repository-name "$REPOSITORY_NAME" --region us-east-1

          # Login OCI
          aws ecr-public get-login-password --region us-east-1 | helm registry login public.ecr.aws --username AWS --password-stdin
          echo inputs.TeamProject: ${{inputs.TeamProject}}
          echo inputs.appName: ${{inputs.appName }}
          echo inputs.helmChartVersionLatest: ${{inputs.helmChartVersionLatest}}
          echo inputs.ECR_FULLNAME: ${{inputs.ECR_FULLNAME }}

          # Push al repo ECR Public (SIN agregar chart name extra ni duplicar path)
          helm push ${{inputs.TeamProject}}-${{inputs.appName }}-${{inputs.helmChartVersionLatest}}.tgz  oci://${{inputs.ECR_FULLNAME }}/${{inputs.TeamProject}}-${{inputs.appName}}

name: 'Helm pack and Push chart to ECR'
inputs:
  ECR_ID:
    description: "ID de ECR (Account ID o Identifier, si lo necesitas)"
    required: true
  ECR_PASSWORD:
    description: "Token temporal de ECR"
    required: true
  ECR_FULLNAME:
    description: "URL completa del registry ECR (ej. 1234.dkr.ecr.region.amazonaws.com)"
    required: true

  appdataJson:
    description: "Json con los datos de la aplicación"
    required: true
  sufijo:
    description: "Identificación del cluster de destino"
    required: true
  appVersion:
    description: "tag para subir imagen"
    required: true
  helmChartVersionLatest:
     description: "VersionHelm"
     required: true
  
runs:
  using: "composite"
  steps:
    - run: echo 'Inicia el proceso'
      shell: bash
      
    - name: Install Helm
      uses: azure/setup-helm@v5
      with:
        version: v3.21.2 #Anteriormente 3.12.3
    - name: Preparación de variables de configuración 
      shell: bash
      env:
        APPDATA_JSON: ${{ inputs.appdataJson }}
        INPUT_SUFIJO: ${{ inputs.sufijo }}
      run: |-
        APP_NAME=$(echo "$APPDATA_JSON" | jq -r '.appdata.appname')
        PROJECT_NAME=$(echo "$APPDATA_JSON" | jq -r '.appdata.projectName')
        CHART_NAME="${PROJECT_NAME}-${APP_NAME}"
        NAMESPACE="${PROJECT_NAME}-${INPUT_SUFIJO}"
        ARTIFACT_NAME="${APP_NAME}-${NAMESPACE}"
        
        echo "Obtenido nombre de app: ${APP_NAME}"
        echo "Obtenido proyecto: ${PROJECT_NAME}"
        echo "Obtenido chart-name: ${CHART_NAME}"
        echo "Obtenido namespace: ${NAMESPACE}"

        echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
        echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV
        echo "NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
        echo "CHART_NAME=$CHART_NAME" >> $GITHUB_ENV
        echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"     

    - uses: actions/download-artifact@v6
      with:
        name: ${{inputs.appName}}-${{inputs.namespace}}

  # Verifica chart por errores de manifiesto. 
  # La funcionalidad de este paso se puede ampliar mediante un JSON de configuración.
    - name: Helm Lint 
      shell: bash
      run: |-
        helmLint="helm lint --values=values.yaml > /dev/null 2>&1"
        if eval "$helmLint"; then
           echo "HELM Lint OK - El formato del chart y los values parece correcto";
        else
           echo "HELM Lint FAIL - El formato de chart y/o el archivo values parecen ser incorrectos";
           helm lint --values=values.yaml
           exit 1
        fi
    - name: Empaquetar y subir helm chart a acr
      shell: bash
      run: |-
        export PATH="/usr/local/bin:$PATH"

        helm package --version ${{ inputs.helmChartVersionLatest}} --app-version ${{ inputs.appVersion}} --namespace ${{ env.NAMESPACE}} .

        # Push to ECR Public (usa EXACTAMENTE el mismo repo layout)
        aws configure set aws_access_key_id ${{ inputs.ECR_ID }}
        aws configure set aws_secret_access_key ${{ inputs.ECR_PASSWORD }}

        REPOSITORY_NAME="helm/${{ env.CHART_NAME }}"
        # Crea el repo en ECR si no existe
        aws ecr describe-repositories --repository-names "$REPOSITORY_NAME" --region us-east-1 || \
        aws ecr create-repository --repository-name "$REPOSITORY_NAME" --region us-east-1

        # Login OCI
        aws ecr get-login-password --region us-east-1 | helm registry login ${{inputs.ECR_FULLNAME }} --username AWS --password-stdin

        # Push al repo ECR Public (SIN agregar chart name extra ni duplicar path)
        helm push ${{ env.CHART_NAME }}-${{inputs.helmChartVersionLatest}}.tgz  oci://${{inputs.ECR_FULLNAME }}/helm/
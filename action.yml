name: 'Despliegue y Sincronizacion con ArgoCD'

inputs:
#ACR
  ACR_USERNAME:
    description: "user de acr"
    required: true
  ACR_PASSWORD:
    description: "passwrd de acr"
    required: true
  ACR_NAME:
    description: "nommbre del acr"
    required: true
  ACR_FULL_NAME:
    description: "nombre del acr con azurecr.io"
    required: true

#App
  appName:
    description: "Nombre de la aplicacion (dentro del proyecto)"
    required: true
  projectName:
    description: "Nombre del proyecto/equipo"
    required: true
  namespace:
    description: "nombre de namespaces"
    required: true
  environment:
    description: "nombre de ambiente"
    required: false
    default: "test"
  sufijo:
    description: "nombre de cluster"
    required: false
    default: "test"
  appVersion:
    description: "tag para subir imagen"
    required: true
  helmChartVersionLatest:
    description: "VersionHelm"
    required: true

#Argo
  ARGO_USERNAME:
    description: "usuario de ArgoCD"
    required: true
  ARGO_PASSWORD:
    description: "pass de ArgoCD"
    required: true
  ARGO_URL:
    description: "url de ArgoCD"
    required: true


runs:
  using: "composite"
  steps:
      - run: echo hi!, we deploying.
        shell: bash

      - name: Generate name
        shell: bash
        id: name
        run: echo "applicationName=${{inputs.projectName}}-${{inputs.appName}}-${{inputs.sufijo}}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v6
        with:
          name: ${{inputs.appName}}-${{inputs.namespace}}
          

        # Se intentan varias veces los pasos para evitar fallos si el ArgoCD no responde a tiempo
      - name: Login ArgoCD
        shell: bash
        run: |-
          echo '${{ inputs.ACR_PASSWORD }}' | helm registry login ${{ inputs.ACR_FULL_NAME }} --username ${{ inputs.ACR_USERNAME }} --password-stdin
          echo 'login a argocd'
          variableOk=0
          argoCommand="argocd login --username ${{ inputs.ARGO_USERNAME }} --password ${{ inputs.ARGO_PASSWORD }} --insecure ${{ inputs.ARGO_URL }} --grpc-web --skip-test-tls"
          for i in {1..5}
          do
          if eval "$argoCommand"; then
              echo "ArgoCD login OK"
              variableOk=1
              break
             else
               echo "ArgoCD login $i/5"
               sleep 40
             fi
          done
          if [[ $variableOk != "1" ]]
          then
              echo "Error en ArgoCD Login" >&2;
              exit 1
          fi

      - name: Create Project
        shell: bash
        run: |
          echo 'Creacion proyecto argocd'
          variableOk=0
          argoCommand="argocd proj get ${{inputs.namespace}}"
          if eval "$argoCommand"; then
            echo "El proyecto ya existe"
            variableOk=1
          else
            echo "El proyecto no existe en ArgoCD, procediendo a crearlo"
            argoCommand="argocd proj create ${{inputs.namespace}} --upsert --dest https://kubernetes.default.svc,${{inputs.namespace}} --src  ${{ inputs.ACR_FULL_NAME }}/helm --grpc-web"
            for i in {1..2}
            do
            if eval "$argoCommand"; then
                echo "ArgoCD Project create OK"
                variableOk=1
                break
               else
                 echo "ArgoCD Project create $i/2"
                 sleep 40
               fi
            done
            if [[ ${{inputs.environment}} =~ "test" ]]; then
              echo "El proyecto $NAMESPACE es de test, le ponemos la ventana de sincronización"
              argocd proj windows add ${{inputs.namespace}} --kind deny --schedule "30 21 * * *" --duration 11h --applications "*"
              argocd proj windows enable-manual-sync ${{inputs.namespace}} 0
            fi
          fi
          if [[ $variableOk != "1" ]]
          then
              echo "Error en ArgoCD Project create" >&2;
              exit 1
          fi
      - name: creación app ArgoCD
        shell: bash
        run: |
          echo 'creacion app argocd'
          variableOk=0
          argoCommand="argocd app create ${{ steps.name.outputs.applicationName }} --repo ${{ inputs.ACR_FULL_NAME }}/helm --helm-chart ${{inputs.projectName}}-${{inputs.appName}} --upsert --helm-set Chart.yaml=Chart.yaml --helm-set-file values.yaml=values.yaml --helm-set-file Chart.yaml=Chart.yaml --revision ${{ inputs.helmChartVersionLatest}} --dest-namespace ${{inputs.namespace}} --dest-server https://kubernetes.default.svc --sync-policy auto --auto-prune --self-heal --project ${{inputs.namespace}} --grpc-web"
          
          for i in {1..2}
          do
          if eval "$argoCommand"; then
              echo "ArgoCD app create OK"
              variableOk=1
              break
             else
               echo "ArgoCD app create $i/2"
               sleep 40
             fi
          done
          if [[ $variableOk != "1" ]]
          then
              echo "Error en ArgoCD app create" >&2;
              exit 1
          fi
      - name: Clear cache
        shell: bash
        continue-on-error: true
        run: |
          #Limpia cache de argocd - hard refresh
          argocd app get ${{ steps.name.outputs.applicationName }} --hard-refresh --grpc-web

      - name: Wait Sync
        shell: bash
        run: |
          #Wait. Espera la synchronizacion, espera 40s
          argoWait="argocd app wait ${{ steps.name.outputs.applicationName }} --health --operation --timeout 30 --grpc-web"
          if eval "$argoWait"; then
            echo "ArgoCD app wait OK"
          else
            echo "ArgoCD app wait 40s"
              sleep 40
          fi

      - name: Sync
        shell: bash
        run: |
          #Synch del repo (Fuerza el cambio de la aplicación a lo que se encuentra en los repos)
          argoCommand="argocd app sync ${{ steps.name.outputs.applicationName }} --prune --force --retry-limit 5 --grpc-web --async"
          variableOk=0
          for i in {1..3}
          do
          if eval "$argoCommand"; then
              echo "ArgoCD sync OK"
              variableOk=1
              break
             else
               echo "ArgoCD sync $i/3"
               sleep 40
             fi
          done
          if [[ $variableOk != "1" ]]
          then
              echo "Error en ArgoCD sync" >&2;
              exit 1
          fi

      - name: Wait Sync
        shell: bash
        run: |
          #Wait. Espera la synchronizacion, esperan 40s, esperan 3 veces
          argoWait="argocd app wait ${{ steps.name.outputs.applicationName }} --health --operation --timeout 30"
          for i in {1..3}
          do
          if eval "$argoWait"; then
                echo "ArgoCD app wait OK"
                break
            else
                echo "ArgoCD app wait $i/3"
                sleep 40
            fi
          done
          
      - name: Check ArgoCD Application Status
        shell: bash
        run: |
          MAX_ATTEMPTS=3
          ATTEMPT=1
          APP_NAME="${{ steps.name.outputs.applicationName }}"
      
          while [[ $ATTEMPT -le $MAX_ATTEMPTS ]]; do
            echo "🔍 Intento $ATTEMPT de $MAX_ATTEMPTS para corroborar estado de $APP_NAME..."
      
            OUTPUT=$(argocd app get "$APP_NAME")
            APP_STATUS=$(echo "$OUTPUT" | grep "Health Status" | awk '{print $NF}')
            SYNC_STATUS=$(echo "$OUTPUT" | grep "Sync Status" | awk '{print $3}')
      
            echo "➡️  Estado de salud: $APP_STATUS"
            echo "➡️  Estado de sincronización: $SYNC_STATUS"
      
            if [[ "$APP_STATUS" == "Healthy" && "$SYNC_STATUS" == "Synced" ]]; then
              echo "::notice::✅ La aplicación $APP_NAME está Healthy y sincronizada con los cambios de este despliegue ✅"
              exit 0
            fi
      
            if [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; then
              echo "⏳ Estado aún no satisfactorio. Esperando 60 segundos antes del próximo intento..."
              sleep 60
            fi
            ((ATTEMPT++))
          done
          if [[ "$APP_STATUS" == "Healthy" ]]; then
            echo "::warning::❌ 👎La aplicación $APP_NAME no quedó sincronizada con los cambios en este despliegue (Status: $SYNC_STATUS )👎. Se recomienda revisar archivo values o consultar con el equipo de DevOps"
          else
            echo "::warning::❌ La aplicación $APP_NAME NO está Healthy ❌ (Estado actual: $APP_STATUS), probable crashloop, revisar los logs del pod ❌"
          fi
          exit 1



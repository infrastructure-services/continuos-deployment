name: 'Generate values.yaml'
description: 'Action to generate values.yaml file from .devops values-env.yaml file and repository variables'
inputs:

  APPS_CERTIFICATE:
    description: "Certificado para el dominio de apps en ARO"
    required: true
  APPS_CA_CERTIFICATE:
    description: "Certificado de la CA"
    required: true
  APPS_KEY_CERTIFICATE:
    description: "Certificado ARO Key"
    required: true
    
  GITHUB_HELMREPO_TOKEN:
    description: "Token para descargar el codigo de templates HELM"
    required: true
  helmRepo:
    description: "Repositorio de helm"
    required: false
    default: "infrastructure-services/manifiestos-cd"
  helmRepoRef:
    description: "Ref del repositorio de Helm"
    required: false
    default: "standard"
    
  appName:
    description: "Nombre de la aplicacion (dentro del proyecto)"
    required: true
  namespace:
    description: "nombre de namespace"
    required: false
    default: ""
    
  clusterFqdn:
     description: "FQDN para pasarle a helm"
     required: true
  fileValuesPath:
    description: "path archivo de values.yaml"
    required: true
  teamProject:
    description: "Nombre del proyecto/equipo"
    required: true
    
  cpuLimit:
    description: "Limite de CPU del pod"
    required: false
    default: "1"
  memLimit:
    description: "Limite de Memoria del Pod"
    required: false
    default: "1Gi"
  cpuRequest:
    description: "Request de CPU del pod"
    required: false
    default: "40m"
  memRequest:
    description: "Request de Memoria del Pod"
    required: false
    default: "200Mi"

  # AZURE KEY VAULT
  AZURE_KEYVAULT_NAME:
    description: "Nombre del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_TENANT:
    description: "Tenant del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_CLIENT_ID:
    description: "Client ID del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_SECRET:
    description: "Secret del keyvault"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - run: echo '🎁Generate values.yaml'
      shell: bash

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: v3.12.3 #Helm 13 tiene un bug (5/11/2024 Hay que chequear si todavía está)
        
    - name: checkout codigo
      uses: actions/checkout@v4

    - name: Copy values.yaml
      shell: bash
      run: |-
          ls ../
          cp ${{ inputs.fileValuesPath }} ../values.yaml

    - name: Checkout code helm templates
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.helmRepo }}
        ref: ${{ inputs.helmRepoRef }}
        token: ${{ inputs.GITHUB_HELMREPO_TOKEN }}
    
    - name: Restore values.yaml
      shell: bash
      run: cp ../values.yaml values.yaml
    
    - name: Helm customizer le agregan valores al values
      shell: bash
      run: |-
        echo -e 'cluster:\n  fqdn: ${{ inputs.clusterFqdn}}' >> values.yaml
        ls
        echo 'namespace: ${{inputs.namespace}}' >> values.yaml
        echo 'projectName: ${{inputs.teamProject}}' >> values.yaml
        echo 'appname: ${{inputs.appName}}' >> values.yaml
        echo 'cpulimit: ${{inputs.cpuLimit}}' >> values.yaml
        echo 'memlimit: ${{inputs.memLimit}}' >> values.yaml
        echo 'cpurequest: ${{inputs.cpuRequest}}' >> values.yaml
        echo 'memrequest: ${{inputs.memRequest}}' >> values.yaml
        echo 'caCertificate: |' >> values.yaml
        echo -e "${{inputs.APPS_CA_CERTIFICATE}}" | sed 's/^/    /' >> values.yaml
        echo 'certificate: |' >> values.yaml
        echo -e "${{inputs.APPS_CERTIFICATE}}" | sed 's/^/    /' >> values.yaml
        echo 'key: |' >> values.yaml
        echo -e "${{inputs.APPS_KEY_CERTIFICATE}}" |  sed 's/^/    /' >> values.yaml
        echo 'name: ${{inputs.teamProject}}-${{inputs.appName}}' >> Chart.yaml

        # 🚀 Agregás tu sección "env_default"
        echo 'env_default:' >> values.yaml
        echo '  ELASTIC_APM_ACTIVE: true' >> values.yaml
        echo '  ELASTIC_APM_ENABLED: true' >> values.yaml
        echo '  REACT_APP_DISABLE_APM: 0' >> values.yaml
        echo '  NEXT_PUBLIC_DISABLE_APM: 0' >> values.yaml
        echo '  ELASTIC_APM_SERVER_URL: "https://apm-mon.andreani.com"' >> values.yaml
        echo '  ELASTIC_APM_SERVICE_NAME: ${{inputs.teamProject}}-${{inputs.appName}}' >> values.yaml
        echo '  Observability__ServerUrls: "https://apm-mon.andreani.com"' >> values.yaml
        echo '  Observability__ServiceName: ${{inputs.namespace}}--${{inputs.appName}}' >> values.yaml


    - name: Inject Azure Key Vault if exists
      shell: bash
      env: 
        AZURE_KEYVAULT_CLIENT_ID: ${{ inputs.AZURE_KEYVAULT_CLIENT_ID }}
        AZURE_KEYVAULT_SECRET: ${{ inputs.AZURE_KEYVAULT_SECRET }}
        AZURE_KEYVAULT_NAME: ${{ inputs.AZURE_KEYVAULT_NAME }}
        AZURE_KEYVAULT_TENANT: ${{ inputs.AZURE_KEYVAULT_TENANT }}
      if: ${{ inputs.AZURE_KEYVAULT_NAME != '' && inputs.AZURE_KEYVAULT_TENANT != '' && inputs.AZURE_KEYVAULT_CLIENT_ID != '' && inputs.AZURE_KEYVAULT_SECRET != '' }}
      run: |
        sed -i "/replicacontroller:/i \    AzureKeyVault__Name: ${AZURE_KEYVAULT_NAME}" values.yaml
        sed -i "/replicacontroller:/i \    AzureKeyVault__TenantId: ${AZURE_KEYVAULT_TENANT}" values.yaml
        sed -i "/replicacontroller:/i \    AzureKeyVault__ClientId: ${AZURE_KEYVAULT_CLIENT_ID}" values.yaml
        sed -i "/replicacontroller:/i \    AzureKeyVault__ClientSecret: ${AZURE_KEYVAULT_SECRET}" values.yaml

    - name: show values
      shell: bash
      run: cat values.yaml

    - name: show Chart
      shell: bash
      run: cat Chart.yaml

    - name: Archive values yaml
      uses: actions/upload-artifact@v4
      with:
        name: ${{inputs.appName}}-${{inputs.namespace}}
        overwrite: true
        path: |
          values.yaml
          Chart.yaml
          templates/



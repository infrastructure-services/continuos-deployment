name: 'Despliegue y Sincronizacion con ArgoCD para EKS'

inputs:
  ECR_ID:
    description: "user de ecr"
    required: true
  ECR_PASSWORD:
    description: "passwrd de ecr"
    required: true
  ECR_FULLNAME:
    description: "nombre del ecr completo con id, ej public.ecr.aws/u1w1q0t2"
    required: true

  appName:
    description: "Nombre de la aplicacion (dentro del proyecto)"
    required: true
  teamProject:
    description: "Nombre del proyecto/equipo"
    required: true
  appVersion:
    description: "tag para subir imagen"
    required: true

  ARGO_USERNAME:
    description: "usuario de ArgoCD"
    required: true
  ARGO_PASSWORD:
    description: "pass de ArgoCD"
    required: true
  ARGO_URL:
    description: "url de ArgoCD"
    required: true

  helmChartVersionLatest:
    description: "VersionHelm"
    required: true
  namespace:
    description: "nombre de namespace"
    required: false
    default: ""
  environment:
    description: "nombre de environment"
    required: false
    default: ""
#env:
  #Es un valor que viene del secreto, pero el install de helm lo espera cmo variable 'plana'
#  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
runs:
  using: "composite"
  steps:
      - run: echo hi!, we working.
        shell: bash
      - name: Generate name
        shell: bash
        id: name
        run: echo "applicationName=${{inputs.appName}}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: ${{inputs.appName}}-${{inputs.namespace}}
          

        # Se intentan varias veces los pasos para evitar fallos si el ArgoCD no responde a tiempo
      - name: Login ArgoCD
        shell: bash
        run: |-
          echo 'Login a Helm'
          aws configure set aws_access_key_id ${{ inputs.ECR_ID }}
          aws configure set aws_secret_access_key ${{ inputs.ECR_PASSWORD }}
          aws ecr-public get-login-password --region us-east-1 | helm registry login public.ecr.aws --username AWS --password-stdin
          
          echo 'login a argocd'
          variableOk=0
          argoCommand="argocd login --username ${{ inputs.ARGO_USERNAME }} --password ${{ inputs.ARGO_PASSWORD }} --insecure ${{ inputs.ARGO_URL }} --grpc-web"
          for i in {1..5}
          do
          if eval "$argoCommand"; then
              echo "ArgoCD login OK"
              variableOk=1
              break
             else
               echo "ArgoCD login $i/5"
               sleep 40
             fi
          done
          if [[ $variableOk != "1" ]]
          then
              echo "Error en ArgoCD Login" >&2;
              exit 1
          fi

      - name: Create Project
        shell: bash
        run: |
          echo 'Creacion proyecto argocd'
          variableOk=0
          argoCommand="argocd proj get ${{inputs.namespace}}"
          if eval "$argoCommand"; then
            echo "El proyecto ya existe"
            variableOk=1
          else
            echo "El proyecto no existe en ArgoCD, procediendo a crearlo"
            argoCommand="argocd proj create ${{inputs.namespace}} --upsert --dest https://kubernetes.default.svc,${{inputs.namespace}} --src  ${{ inputs.ECR_FULLNAME }} --grpc-web"
            for i in {1..5}
            do
            if eval "$argoCommand"; then
                echo "ArgoCD Project create OK"
                variableOk=1
                break
               else
                 echo "ArgoCD Project create $i/5"
                 sleep 40
               fi
            done
          fi
          if [[ $variableOk != "1" ]]
          then
              echo "Error en ArgoCD Project create" >&2;
              exit 1
          fi
      - name: creación app ArgoCD
        shell: bash
        run: |
          echo 'creacion app argocd'
          variableOk=0
          argoCommand="argocd app create ${{ steps.name.outputs.applicationName }} --repo ${{ inputs.ECR_FULLNAME }} --helm-chart ${{inputs.teamProject}}-${{inputs.appName}} --upsert --helm-set Chart.yaml=Chart.yaml --helm-set-file values.yaml=values.yaml --helm-set-file Chart.yaml=Chart.yaml --revision ${{ inputs.helmChartVersionLatest}} --dest-namespace ${{inputs.namespace}} --dest-server https://kubernetes.default.svc --sync-policy auto --auto-prune --self-heal --project ${{inputs.namespace}} --grpc-web"
          
          for i in {1..5}
          do
          if eval "$argoCommand"; then
              echo "ArgoCD app create OK"
              variableOk=1
              break
             else
               echo "ArgoCD app create $i/5"
               sleep 40
             fi
          done
          if [[ $variableOk != "1" ]]
          then
              echo "Error en ArgoCD app create" >&2;
              exit 1
          fi
      - name: Wait Sync
        shell: bash
        run: |
          #Wait. Espera la synchronizacion, esperan 40s, espera 2 veces
          # validar el nombre, antes tenia el -qa al final
          argoWait="argocd app wait ${{ steps.name.outputs.applicationName }} --health --operation --timeout 30"
          for i in {1..2}
          do
          if eval "$argoWait"; then
                echo "ArgoCD app wait OK"
                break
            else
                echo "ArgoCD app wait $i/5"
                sleep 40
            fi
          done
      - name: Clear cache
        shell: bash
        run: |
          #Limpia cache de argocd - hard refresh
          argocd app get ${{ steps.name.outputs.applicationName }} refresh --hard-refresh --grpc-web 2>&1
          
      - name: Sync
        shell: bash
        run: |
          #Synch del repo (Fuerza el cambio de la aplicación a lo que se encuentra en los repos)
          argoCommand="argocd app sync ${{ steps.name.outputs.applicationName }} --prune --force --retry-limit 5 --grpc-web --async"
          variableOk=0
          for i in {1..5}
          do
          if eval "$argoCommand"; then
              echo "ArgoCD sync OK"
              variableOk=1
              break
             else
               echo "ArgoCD sync $i/5"
               sleep 40
             fi
          done
          if [[ $variableOk != "1" ]]
          then
              echo "Error en ArgoCD sync" >&2;
              exit 1
          fi

      - name: Wait Sync
        shell: bash
        run: |
          #Wait. Espera la synchronizacion, esperan 40s, esperan 3 veces
          argoWait="argocd app wait ${{ steps.name.outputs.applicationName }} --health --operation --timeout 30"
          for i in {1..3}
          do
          if eval "$argoWait"; then
                echo "ArgoCD app wait OK"
                break
            else
                echo "ArgoCD app wait $i/5"
                sleep 40
            fi
          done

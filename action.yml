name: 'Deploy Selector'
description: 'Selecciona el mejor despliegue posible según el cluster objetivo'
inputs:
  #Cluster de Destino
  TARGET_CLUSTER:
    description: "Cluster objetivo donde se despliega"
    required: true
  TARGET_VARIABLE:
    description: "Variable conteniendo la data del cluster"
    required: true
  TARGET_SECRET:
    description: "Secret conteniendo la data del cluster"
    required: true
  environment:
    description: "Ambiente"
    required: false
    default: "test"
  sufijo:
    description: "sufijo de cluster"
    required: false
    default: "test"

  # ACR
  REGISTRY_DATA:
    description: "Secreto de datos de la registry correspondiente"
    required: true
  REGISTRY_SELECTOR:
    description: "Tipo de registry a seleccionar"
    required: false
    default: "acr"


  # Datos de la aplicación
  appdataJson:
    description: "Json con el conjunto de datos de la aplicación a desplegar"
    required: true
  appVersion:
    description: "Tag de imagen a desplegar"
    required: true


  # Values y template de manifiestos
  helmRepo:
    description: "Repositorio de templates de manifiestos"
    required: false
    default: "infrastructure-services/manifiestos-cd"
  flavor:
    description: "Conjunto de manifiestos a utilizar"
    required: false
    default: "new-standard"
  fileValuesPath:
    description: "path archivo de values.yaml"
    required: true
  GITHUB_HELMREPO_TOKEN:
    description: "Token para descargar el codigo de templates HELM"
    required: true

  # HELM
  helmChartVersionLatest:
    description: "Version de chart Helm a asignar para este despliegue"
    required: true
    

  # Keyvault Optional
  AZURE_KEYVAULT_NAME:
    description: "Nombre del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_TENANT:
    description: "Tenant del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_CLIENT_ID:
    description: "Client ID del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_SECRET:
    description: "Secret del keyvault"
    required: false
    default: ""
  AZURE_KEYVAULT_PREFIX:
    description: "Prefijo de las variables de la app en keyvault"
    required: false
    default: ""

outputs:
  name_environment: 
    description: "Nombre del environment"
    value: ${{ steps.setOutputs.outputs.environment }}
  url_environment:
    description: "URL del environment"
    value: ${{ steps.setOutputs.outputs.url }}

runs:
  using: "composite"
  steps:
    - name: Configurar variables para despliegue
      id: configurar_despliegue
      run: |
        # Extracción de variables
        # Guardar el contenido del var en un archivo temporal
        echo '${{ inputs.TARGET_VARIABLE }}' > var_content.txt
        
        #Extraigo variables
        FQDN=$(jq -r '.CLUSTERFQDN' var_content.txt)
        APMURL=$(jq -r '.APM_SERVER_URL' var_content.txt)
        GSLB=$(jq -r '.GSLB' var_content.txt)

        #Configuro ENV
        echo "CLUSTERFQDN=$FQDN" >> $GITHUB_ENV
        echo "APM_SERVER_URL=$APMURL" >> $GITHUB_ENV
        echo "GSLB=$GSLB" >> $GITHUB_ENV

        # Ahora lo mismo con el secret
        echo '${{ inputs.TARGET_SECRET }}' > secret_content.txt
        
        #Extraigo variables
        URL=$(jq -r '.ARGO_URL' secret_content.txt)
        USR=$(jq -r '.ARGO_USER' secret_content.txt)
        PAS=$(jq -r '.ARGO_PASS' secret_content.txt)

        #Configuro ENV (Despues lo haré directo con la var y el secret de cluster)
        echo "ARGO_URL=$URL" >> $GITHUB_ENV
        echo "ARGO_USR=$USR" >> $GITHUB_ENV
        echo "ARGO_PAS=$PAS" >> $GITHUB_ENV

        #Limpieza
        rm -f secret_content.txt var_content.txt
      shell: bash
    - name: Deploy
      id: deploy
      if: ${{ inputs.TARGET_CLUSTER == 'AKSTEST' || inputs.TARGET_CLUSTER == 'AKSQA' || inputs.TARGET_CLUSTER == 'CCEPROD' || inputs.TARGET_CLUSTER == 'AKSPRODBR' || inputs.TARGET_CLUSTER == 'AKSPRODUS' }}
      uses: infrastructure-services/continuos-deployment@deploy-andreani
      with:
        appdataJson: ${{ inputs.appdataJson }}
        appVersion: ${{ inputs.appVersion }}
        clusterFqdn: ${{ env.CLUSTERFQDN }}
        gslb: ${{ env.GSLB }}
        fileValuesPath: ${{ inputs.fileValuesPath }}
        GITHUB_HELMREPO_TOKEN: ${{ inputs.GITHUB_HELMREPO_TOKEN }}
        helmChartVersionLatest: ${{ inputs.helmChartVersionLatest }}
        REGISTRY_DATA: ${{ inputs.REGISTRY_DATA }}
        REGISTRY_SELECTOR: ${{ inputs.REGISTRY_SELECTOR }}
        TARGET_CLUSTER: ${{ inputs.TARGET_CLUSTER }}
        ARGO_USERNAME: ${{ env.ARGO_USR }}
        ARGO_PASSWORD: ${{ env.ARGO_PAS }}
        ARGO_URL: ${{env.ARGO_URL }}
        environment: ${{ inputs.environment }}
        sufijo: ${{ inputs.sufijo }}
        flavor: ${{ inputs.flavor }}
        APM_SERVER_URL: ${{env.APM_SERVER_URL }}
        AZURE_KEYVAULT_NAME: ${{ inputs.AZURE_KEYVAULT_NAME }}
        AZURE_KEYVAULT_TENANT: ${{ inputs.AZURE_KEYVAULT_TENANT }}
        AZURE_KEYVAULT_CLIENT_ID: ${{ inputs.AZURE_KEYVAULT_CLIENT_ID }}
        AZURE_KEYVAULT_SECRET: ${{ inputs.AZURE_KEYVAULT_SECRE }}
        AZURE_KEYVAULT_PREFIX: ${{ inputs.AZURE_KEYVAULT_PREFIX }}

    - name: Deploy Hop
      id: deployhop
      if: ${{ inputs.TARGET_CLUSTER == 'HOPSBX' || inputs.TARGET_CLUSTER == 'HOPPROD' }}
      uses: infrastructure-services/continuos-deployment@deploy-hop
      with:
        appdataJson: ${{ inputs.appdataJson }}
        appVersion: ${{ inputs.appVersion }}
        fileValuesPath: ${{ inputs.fileValuesPath }}
        GITHUB_HELMREPO_TOKEN: ${{ inputs.GITHUB_HELMREPO_TOKEN }}
        helmChartVersionLatest: ${{ inputs.helmChartVersionLatest }}
        REGISTRY_DATA: ${{ inputs.REGISTRY_DATA }}
        REGISTRY_SELECTOR: ${{ inputs.REGISTRY_SELECTOR }}
        ARGO_USERNAME: ${{ env.ARGO_USR }}
        ARGO_PASSWORD: ${{ env.ARGO_PAS }}
        ARGO_URL: ${{env.ARGO_URL }}
        sufijo: ${{ inputs.sufijo }}
        flavor: ${{ inputs.flavor }}
        AZURE_KEYVAULT_NAME: ${{ inputs.AZURE_KEYVAULT_NAME }}
        AZURE_KEYVAULT_TENANT: ${{ inputs.AZURE_KEYVAULT_TENANT }}
        AZURE_KEYVAULT_CLIENT_ID: ${{ inputs.AZURE_KEYVAULT_CLIENT_ID }}
        AZURE_KEYVAULT_SECRET: ${{ inputs.AZURE_KEYVAULT_SECRE }}
        AZURE_KEYVAULT_PREFIX: ${{ inputs.AZURE_KEYVAULT_PREFIX }}

    - name: Deploy Witwot
      id: deployWitwot
      if: ${{ inputs.TARGET_CLUSTER == 'WWDEV' || inputs.TARGET_CLUSTER == 'WWTEST' || inputs.TARGET_CLUSTER == 'WWPREPROD' || inputs.TARGET_CLUSTER == 'WWPROD'}}
      uses: infrastructure-services/continuos-deployment@deploy-witwot
      with:
        appdataJson: ${{ inputs.appdataJson }}
        appVersion: ${{ inputs.appVersion }}
        fileValuesPath: ${{ inputs.fileValuesPath }}
        GITHUB_HELMREPO_TOKEN: ${{ inputs.GITHUB_HELMREPO_TOKEN }}
        helmChartVersionLatest: ${{ inputs.helmChartVersionLatest }}
        REGISTRY_DATA: ${{ inputs.REGISTRY_DATA }}
        REGISTRY_SELECTOR: ${{ inputs.REGISTRY_SELECTOR }}
        ARGO_USERNAME: ${{ env.ARGO_USR }}
        ARGO_PASSWORD: ${{ env.ARGO_PAS }}
        ARGO_URL: ${{env.ARGO_URL }}
        sufijo: ${{ inputs.sufijo }}
        flavor: ${{ inputs.flavor }}
        AZURE_KEYVAULT_NAME: ${{ inputs.AZURE_KEYVAULT_NAME }}
        AZURE_KEYVAULT_TENANT: ${{ inputs.AZURE_KEYVAULT_TENANT }}
        AZURE_KEYVAULT_CLIENT_ID: ${{ inputs.AZURE_KEYVAULT_CLIENT_ID }}
        AZURE_KEYVAULT_SECRET: ${{ inputs.AZURE_KEYVAULT_SECRE }}
        AZURE_KEYVAULT_PREFIX: ${{ inputs.AZURE_KEYVAULT_PREFIX }}



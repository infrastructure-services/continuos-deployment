name: 'Pack push and Deploy for flexipaas clients'
description: 'Pack push and Deploy for flexipaas clients with argocd'
inputs:
  # ACR
  ACR_USERNAME:
    description: "user de acr"
    required: true
  ACR_PASSWORD:
    description: "passwrd de acr"
    required: true
  ACR_NAME:
    description: "nommbre del acr"
    required: true
  ACR_FULL_NAME:
    description: "nombre del acr con azurecr.io"
    required: true

  # App
  appName:
    description: "Nombre de la aplicacion (dentro del proyecto)"
    required: true
  teamProject:
    description: "Nombre del proyecto/equipo"
    required: false
    default: "agentes-flexipaas"
  appVersion:
    description: "tag para subir imagen"
    required: true
  namespace:
    description: "nombre de namespaces"
    required: false
    default: ""
  environment:
    description: "nombre de environment"
    required: false
    default: "test"

  # Values
  helmRepo:
    description: "Repositorio de helm"
    required: false
    default: "infrastructure-services/manifiestos-cd"
  helmRepoRef:
    description: "Ref del repositorio de Helm"
    required: false
    default: "standard-nocert"
  cpuLimit:
    description: "Limite de CPU del pod"
    required: false
    default: "1"
  memLimit:
    description: "Limite de Memoria del Pod"
    required: false
    default: "1Gi"
  cpuRequest:
    description: "Request de CPU del pod"
    required: false
    default: "20m"
  memRequest:
    description: "Request de Memoria del Pod"
    required: false
    default: "50Mi"
  fileValuesPath:
    description: "path archivo de values.yaml"
    required: true
  GITHUB_HELMREPO_TOKEN:
    description: "Token para descargar el codigo de templates HELM"
    required: true

  # HELM
  helmChartVersionLatest:
    description: "VersionHelm"
    required: true
  clusterFqdn:
     description: "FQDN para pasarle a helm"
     required: true
    
  # ArgoCD
  ARGO_USERNAME:
    description: "usuario de ARgocd"
    required: true
  ARGO_PASSWORD:
    description: "pass de ARgocd"
    required: true
  ARGO_URL:
    description: "url de ARgocd"
    required: true

  # Observabilidad
  APM_SERVER_URL:
    description: "Url de APM"
    required: false
    default: "https://apm-mon.andreani.com"

outputs:
  name_environment: 
    description: "Nombre del environment"
    value: ${{ steps.setOutputs.outputs.environment }}

runs:
  using: "composite"
  steps:
        
    - name: Set Outputs
      id: setOutputs
      shell: bash
      run: |
        echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
    - name: Clone Repository.
      uses: actions/checkout@v4
    - name: Generate helm version
      uses: actions/github-script@v7
      id: helmversion
      with:
        script: |
          let helmChartVersionLatest = "${{ inputs.helmChartVersionLatest }}";
          if (!helmChartVersionLatest.includes('-')) {
              helmChartVersionLatest = helmChartVersionLatest.replace(/\.([^\.]*)$/, '-$1');
          }
          return helmChartVersionLatest
        result-encoding: string

    - name: Copy values.yaml
      shell: bash
      run: |-
          ls ../
          cp ${{ inputs.fileValuesPath }} ../values.yaml
    - name: Checkout code helm templates
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.helmRepo }}
        ref: ${{ inputs.helmRepoRef }}
        token: ${{ inputs.GITHUB_HELMREPO_TOKEN }}
    - name: Restore values.yaml
      shell: bash
      run: cp ../values.yaml values.yaml
    # Customize values.yaml with the values
    - name: Update values.yaml and chart with parameters
      shell: bash
      run: |
        echo -e 'cluster:\n  fqdn: ${{ inputs.clusterFqdn}}' >> values.yaml
        ls
        echo 'namespace: ${{inputs.namespace}}' >> values.yaml
        echo 'projectName: ${{inputs.teamProject}}' >> values.yaml
        echo 'appname: ${{inputs.appName}}' >> values.yaml
        echo 'cpulimit: ${{inputs.cpuLimit}}' >> values.yaml
        echo 'memlimit: ${{inputs.memLimit}}' >> values.yaml
        echo 'cpurequest: ${{inputs.cpuRequest}}' >> values.yaml
        echo 'memrequest: ${{inputs.memRequest}}' >> values.yaml

    - name: show values
      shell: bash
      run: cat values.yaml

    - name: Archive values yaml
      uses: actions/upload-artifact@v4
      with:
        name: ${{inputs.appName}}-${{inputs.namespace}}
        overwrite: true
        path: |
          values.yaml
          Chart.yaml
          templates/

    - name: build paquete helm.
      id: helm
      uses: infrastructure-services/continuos-deployment@pack-helm
      with:
        appName: ${{ inputs.appName }}
        teamProject: ${{ inputs.teamProject }}
        namespace: ${{ inputs.namespace }}
        appVersion: ${{ inputs.appVersion }}
        helmChartVersionLatest: ${{steps.helmversion.outputs.result}}
        ACR_USERNAME: ${{ inputs.ACR_USERNAME }}
        ACR_PASSWORD: ${{ inputs.ACR_PASSWORD }}
        ACR_FULL_NAME: ${{ inputs.ACR_FULL_NAME }}
        
    - name: Argo deploy 🚀
      id: argo
      uses: infrastructure-services/continuos-deployment@sync-argo
      with:
        appName: ${{ inputs.appName }}
        teamProject: ${{ inputs.teamProject }}
        namespace: ${{ inputs.namespace }}
        appVersion: ${{ inputs.appVersion }}
        helmChartVersionLatest: ${{steps.helmversion.outputs.result}}
        ACR_USERNAME: ${{ inputs.ACR_USERNAME }}
        ACR_PASSWORD: ${{ inputs.ACR_PASSWORD }}
        ACR_FULL_NAME: ${{ inputs.ACR_FULL_NAME }}
        ACR_NAME: ${{ inputs.ACR_NAME }}
        ARGO_USERNAME: ${{ inputs.ARGO_USERNAME }}
        ARGO_PASSWORD: ${{ inputs.ARGO_PASSWORD }}
        ARGO_URL: ${{inputs.ARGO_URL}}
        environment: ${{ inputs.environment }}


